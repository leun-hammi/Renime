<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Renime- where anime meets reality</title>
        <link rel="icon" type="image/x-icon" href="renime_favicon.ico">
        <link rel="stylesheet" href="login.css">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="background">
            <div class="info_card">
            <h1>-RENIME-</h1>
            <h2>Where Anime meets Reality...</h2>
            <p>Explore the real life japanese places where once your favorite Anime Characters wandered around...</p>

            <form class="info_enter">
                <!--Name-->
                <input type="text" placeholder="Your Name"><br><br>

                <!--Fav Anime-->
                <input type="text" placeholder="Your Favorite Anime"><br><br>
            </form>  

            <button class="button">Enter Anime World</button>
            </div>

            <div class="rotating_images">
                <span style="--i:1;"><img src="your_name_card.jpg" alt="Your Name"></span>
                <span style="--i:2;"><img src="your_lie_in_april_card.jpg " alt="Your Lie in April"></span>
                <span style="--i:3;"><img src="sword_art_online_card.jpg" alt="Sword Art Online"></span>

            </div>
        </div>  
    </body>
</html>
